    <link rel="stylesheet" href="/quiz/quiz.css">

    <link rel="icon" type="image/x-icon" href="../images/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="../images/favicon-32x32.png">

</head>
<body>
    <!-- Sidebar (Desktop) -->
    <aside class="quiz-sidebar" id="quizSidebar">
        <div class="sidebar-header">
            <h2>Menu</h2>
            <button class="sidebar-close-btn" onclick="toggleSidebar()">×</button>
        </div>
        <div class="sidebar-section">
            <div class="sidebar-lang-switch">
                <span class="lang-option active" data-lang="de" onclick="switchLanguage('de')">DE</span>
                <span class="lang-option" data-lang="en" onclick="switchLanguage('en')">EN</span>
            </div>
        </div>
        <div class="sidebar-section">
            <a href="/" class="sidebar-nav-link">Home</a>
            <a href="/quiz/category.html" class="sidebar-nav-link">Quiz</a>
            <a href="/chat.html" class="sidebar-nav-link">Chat</a>
            <a href="/admin.html" class="sidebar-nav-link admin-only" style="display: none;">Admin</a>
        </div>
        <div class="sidebar-section sidebar-user-section">
            <span class="sidebar-user-email" id="sidebarUserEmail"></span>
            <button class="sidebar-logout-btn" id="sidebarAuthBtn" onclick="handleLogout()">Abmelden</button>
        </div>
    </aside>

    <div class="quiz-container">
        <!-- Nav Bar -->
        <nav>
            <button class="hamburger-btn mobile-nav" aria-label="Menu">
                <span></span><span></span><span></span>
            </button>
            <div class="nav-left">
                <button class="sidebar-toggle-btn desktop-nav" onclick="toggleSidebar()" aria-label="Menu">☰</button>
                <a href="/" class="logo">Verifyr</a>
                <div class="lang-switch desktop-lang">
                    <span class="lang-option active" data-lang="de" onclick="switchLanguage('de')">DE</span>
                    <span class="lang-option" data-lang="en" onclick="switchLanguage('en')">EN</span>
                </div>
            </div>
            <div class="nav-right desktop-nav">
                <a href="/" class="nav-btn">Home</a>
                <a href="/quiz/category.html" class="nav-btn active">Quiz</a>
                <a href="/quiz/results.html" class="nav-btn" id="navResultsBtn" style="display:none;">Results</a>
                <a href="/chat.html" class="nav-btn">Chat</a>
                <a href="/admin.html" class="nav-btn admin-only" style="display: none;">Admin</a>
                <a href="/auth.html" class="nav-login-btn" id="navLoginBtn" style="display:none;">Login</a>
            </div>
        </nav>

        <!-- Mobile menu -->
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-lang-switch">
                <span class="lang-option active" data-lang="de" onclick="switchLanguage('de')">DE</span>
                <span class="lang-option" data-lang="en" onclick="switchLanguage('en')">EN</span>
            </div>
            <div class="mobile-menu-divider"></div>
            <a href="/" class="mobile-menu-item">Home</a>
            <a href="/quiz/category.html" class="mobile-menu-item active">Quiz</a>
            <a href="/chat.html" class="mobile-menu-item">Chat</a>
            <a href="/admin.html" class="mobile-menu-item admin-only" style="display: none;">Admin</a>
            <div class="mobile-menu-divider"></div>
            <div class="mobile-user-info">
                <span class="mobile-user-email" id="mobileUserEmail"></span>
                <button class="mobile-logout-btn" onclick="handleLogout()">Abmelden</button>
            </div>
        </div>

        <!-- Quiz Content -->
        <div class="quiz-content">

            <!-- Header with Navigation Arrows -->
            <div class="quiz-header-wrapper">
                <a href="/quiz/features.html" class="quiz-nav-arrow quiz-nav-back">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M15 18l-6-6 6-6"/>
                    </svg>
                </a>

                <div class="quiz-header">
                    <h1 id="budgetTitle">Wir sind gleich da...</h1>
                    <div style="display:flex;align-items:center;justify-content:center;gap:6px;">
                        <p class="quiz-subtitle" id="budgetSubtitle" style="margin:0;">Optional</p>
                        <button class="quiz-reset-btn" id="resetBtnTop" title="Reset">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                                <path d="M3 3v5h5"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <button class="quiz-nav-arrow quiz-nav-next" id="nextBtnArrow">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 18l6-6-6-6"/>
                    </svg>
                </button>
            </div>

            <div class="quiz-progress-line">
                <div class="quiz-progress-line-fill" id="progressLineFill"></div>
            </div>
            <script>
                var f = document.getElementById('progressLineFill');
                f.style.width = '75%';
                requestAnimationFrame(() => requestAnimationFrame(() => {
                    f.style.width = '100%';
                }));
            </script>

            <!-- Desktop: step dots -->
            <div class="quiz-progress">
                <div class="progress-step completed"></div>
                <div class="progress-connector completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-connector completed"></div>
                <div class="progress-step completed"></div>
                <div class="progress-connector completed"></div>
                <div class="progress-step active"></div>
            </div>

            <!-- Budget section -->
            <div class="budget-card" style="background-image: url('/images/quiz/budget-card.png');">
                <div class="budget-card-overlay">
                    <span id="budgetCardLabel">Was ist dein Budget?</span>
                </div>
            </div>

            <!-- Range Slider -->
            <div class="budget-slider-section">
                <div class="budget-slider-label">
                    <span id="priceRangeLabel">Preis Range</span>
                    <span id="priceRangeValue">300–800€</span>
                </div>
                <div class="budget-range-wrapper">
                    <div class="budget-range-track">
                        <div class="budget-range-fill" id="rangeFill"></div>
                    </div>
                    <input type="range" class="budget-range-input" id="sliderMin" min="0" max="2000" value="300" step="50">
                    <input type="range" class="budget-range-input" id="sliderMax" min="0" max="2000" value="800" step="50">
                </div>
            </div>

            <!-- Special request section -->
            <div class="budget-card" style="background-image: url('/images/quiz/special-request-card.png');">
                <div class="budget-card-overlay">
                    <span id="specialCardLabel">Haben wir alles gefragt?</span>
                </div>
            </div>

            <!-- Special request input -->
            <div class="budget-textarea-wrapper">
                <label class="budget-textarea-label" id="specialRequestLabel" for="specialRequest">
                    Besondere Anforderungen
                </label>
                <textarea
                    id="specialRequest"
                    class="budget-textarea"
                    maxlength="100"
                    placeholder="Hier beschreiben..."
                ></textarea>
                <span class="budget-char-counter"><span id="charCount">0</span>/100</span>
            </div>

            <!-- Navigation -->
            <div class="quiz-navigation">
                <a href="/quiz/features.html" class="btn btn-secondary">
                    <span id="backBtnText">Zurück</span>
                </a>
                <button class="quiz-reset-btn" id="resetBtn" title="Reset">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
                        <path d="M3 3v5h5"/>
                    </svg>
                </button>
                <button class="btn btn-primary" id="recommendBtn">
                    <span id="ctaText">Produkte Empfehlen</span>
                </button>
            </div>

        </div>
    </div>

    <script src="/quiz/budget.js"></script>

    <script>
        (function() {
            document.addEventListener('contextmenu', e => e.preventDefault());
            document.addEventListener('keydown', e => {
                if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'u')) {
                    e.preventDefault();
                }
            });
        })();
    </script>
    <script>
        (function(){
            if (localStorage.getItem("verifyr_quiz_completed") === "true") {
                var rb = document.getElementById("navResultsBtn");
                if (rb) rb.style.display = "";
            }
            if (!localStorage.getItem("verifyr_access_token")) {
                var btn = document.getElementById("navLoginBtn");
                if (btn) btn.style.display = "";
            }
        })();
        window.addEventListener('storage', function(e) {
            if (e.key === 'verifyr_access_token' && !e.newValue) {
                window.location.href = '/auth.html';
            }
        });
    </script>
    <script src="/version-check.js"></script>
</body>
</html>
